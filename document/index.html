<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MythWriter</title>
    <style>
      /* Loading screen - shown immediately before React mounts */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #020617;
        z-index: 99999;
        transition: opacity 0.3s ease-out;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader .loader-brand {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 2.5rem;
        font-weight: 700;
        color: #60a5fa;
        letter-spacing: -0.02em;
      }
      #app-loader .loader-brand span {
        display: inline-block;
        animation: loaderBounce 0.8s ease-in-out infinite;
      }
      #app-loader .loader-brand span:nth-child(1) { animation-delay: 0.00s; }
      #app-loader .loader-brand span:nth-child(2) { animation-delay: 0.05s; }
      #app-loader .loader-brand span:nth-child(3) { animation-delay: 0.10s; }
      #app-loader .loader-brand span:nth-child(4) { animation-delay: 0.15s; }
      #app-loader .loader-brand span:nth-child(5) { animation-delay: 0.20s; }
      #app-loader .loader-brand span:nth-child(6) { animation-delay: 0.25s; }
      #app-loader .loader-brand span:nth-child(7) { animation-delay: 0.30s; }
      #app-loader .loader-brand span:nth-child(8) { animation-delay: 0.35s; }
      #app-loader .loader-brand span:nth-child(9) { animation-delay: 0.40s; }
      #app-loader .loader-brand span:nth-child(10) { animation-delay: 0.45s; }
      @keyframes loaderBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }
      #app-loader .loader-sub {
        margin-top: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 0.875rem;
        color: #64748b;
      }
      #app-loader .loader-dots {
        margin-top: 24px;
        display: flex;
        gap: 6px;
      }
      #app-loader .loader-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #60a5fa;
        animation: loaderDot 1.2s ease-in-out infinite;
      }
      #app-loader .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
      #app-loader .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes loaderDot {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1.2); }
      }
    </style>
  </head>

  <body>
    <!-- Loading screen -->
    <div id="app-loader">
      <div class="loader-brand">
        <span>M</span><span>y</span><span>t</span><span>h</span><span>W</span><span>r</span><span>i</span><span>t</span><span>e</span><span>r</span>
      </div>
      <div class="loader-sub">Loading...</div>
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module">
      // Hide loader once React renders content into #root
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 350);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
